<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TG 消息助手</title>
    <style>
        :root { --tg-color: #0088cc; --bg-color: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: var(--tg-color); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .grid { display: flex; gap: 10px; margin-bottom: 15px; }
        .field { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 10px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab.active { background: var(--tg-color); color: white; }
        .upload-zone { border: 2px dashed var(--tg-color); background: #f8fbff; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; margin-bottom: 15px; }
        .btn-send { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; background: var(--tg-color); color: white; }
        pre { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; margin-top: 10px; white-space: pre-wrap; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Telegram 消息助手</h2>
    <div class="grid">
        <div class="field"><label>Bot Token</label><input type="text" id="token"></div>
        <div class="field"><label>Chat ID</label><input type="text" id="chatId"></div>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="setMode('a', this)">A. 图片链接</div>
        <div class="tab" onclick="setMode('b', this)">B. 本地上传</div>
        <div class="tab" onclick="setMode('c', this)">C. 纯文字</div>
    </div>
    <div id="imageGroup">
        <div id="uploadBox" style="display:none;">
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">📁 点击上传图片</div>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
        </div>
        <div class="field"><label id="dataLabel">图片 URL</label><textarea id="imageData"></textarea></div>
    </div>
    <div class="field"><label>消息内容</label><textarea id="textContent"></textarea></div>

    <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px;">
        <label style="font-size:12px; color:#666;">按钮配置 (可选)</label>
        <div class="grid">
            <input type="text" id="btn1Text" value="查看规则">
            <input type="text" id="btn1Url" value="https://google.com">
        </div>
        <div class="grid" style="margin-top:5px;">
            <input type="text" id="btn2Text" value="加入群组">
            <input type="text" id="btn2Url" value="https://t.me">
        </div>
    </div>

    <button class="btn-send" onclick="startSend()">🚀 立即执行发送</button>
    <pre id="apiOutput">等待指令...</pre>
</div>
<script src="cc.js"></script>
</body>
</html>
